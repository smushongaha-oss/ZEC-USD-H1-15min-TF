<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V75 Trend Scanner & Sniper Engine</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0f19;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 12px;
      box-sizing: border-box;
    }

    .app-card {
      background-color: #121826;
      border: 1px solid #1f293d;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background-color: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px #22c55e;
      animation: blink 1s infinite alternate;
    }

    .live-dot.offline {
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: none;
    }

    @keyframes blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .header-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #94a3b8;
    }

    .header-badge {
      background-color: #1e293b;
      color: #38bdf8;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Price Card */
    .price-card {
      background-color: #1a2234;
      border: 1px solid #28354d;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      margin-bottom: 14px;
    }

    .price-label {
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .price-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #ffffff;
      font-family: monospace;
    }

    /* Signal Panel */
    .signal-panel {
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      text-align: center;
      background-color: #1a2234;
      border: 1px solid #28354d;
      transition: all 0.3s ease;
    }

    .signal-status-tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: #64748b;
    }

    .signal-direction {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: #64748b;
    }

    .signal-desc {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* Signal States */
    .signal-panel.SNIPER_BUY {
      background-color: rgba(34, 197, 94, 0.12);
      border: 2px solid #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
    }
    .signal-panel.SNIPER_BUY .signal-direction { color: #22c55e; }
    .signal-panel.SNIPER_BUY .signal-status-tag { color: #22c55e; }

    .signal-panel.SNIPER_SELL {
      background-color: rgba(239, 68, 68, 0.12);
      border: 2px solid #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.25);
    }
    .signal-panel.SNIPER_SELL .signal-direction { color: #ef4444; }
    .signal-panel.SNIPER_SELL .signal-status-tag { color: #ef4444; }

    /* Target Levels Grid */
    .levels-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .level-box {
      background-color: #1a2234;
      border: 1px solid #28354d;
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }

    .level-title {
      font-size: 0.65rem;
      font-weight: bold;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .level-val {
      font-size: 0.82rem;
      font-weight: 700;
      font-family: monospace;
      color: #f8fafc;
    }

    .level-box.entry .level-val { color: #38bdf8; }
    .level-box.tp .level-val { color: #22c55e; }
    .level-box.sl .level-val { color: #ef4444; }

    /* Market Structure Diagnostics */
    .diag-container {
      background-color: #161c2b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.72rem;
    }

    .diag-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: #64748b;
    }

    .diag-row:last-child {
      margin-bottom: 0;
    }

    .diag-val {
      font-weight: 600;
      color: #cbd5e1;
      font-family: monospace;
    }

    .trend-bull { color: #22c55e; }
    .trend-bear { color: #ef4444; }
    .trend-range { color: #eab308; }

    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: #475569;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="app-card">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="live-dot" id="live-dot"></div>
        <div class="header-title">Volatility 75 Index</div>
      </div>
      <div class="header-badge">SNIPER V2</div>
    </div>

    <!-- Live Market Price -->
    <div class="price-card">
      <div class="price-label">Live Market Price</div>
      <div class="price-value" id="price-val">0.0000</div>
    </div>

    <!-- Signal Banner -->
    <div class="signal-panel" id="signal-panel">
      <div class="signal-status-tag" id="signal-tag">SCANNING MARKET</div>
      <div class="signal-direction" id="signal-dir">ANALYZING...</div>
      <div class="signal-desc" id="signal-desc">Scanning structural trend & momentum...</div>
    </div>

    <!-- Trade Execution Levels -->
    <div class="levels-grid">
      <div class="level-box entry">
        <div class="level-title">Entry Price</div>
        <div class="level-val" id="level-entry">---</div>
      </div>
      <div class="level-box tp">
        <div class="level-title">Take Profit (1:2)</div>
        <div class="level-val" id="level-tp">---</div>
      </div>
      <div class="level-box sl">
        <div class="level-title">Stop Loss</div>
        <div class="level-val" id="level-sl">---</div>
      </div>
    </div>

    <!-- Market Analysis Metrics -->
    <div class="diag-container">
      <div class="diag-row">
        <span>Macro Trend (EMA 200):</span>
        <span class="diag-val" id="macro-trend">SCANNING...</span>
      </div>
      <div class="diag-row">
        <span>RSI Momentum (14):</span>
        <span class="diag-val" id="rsi-val">---</span>
      </div>
      <div class="diag-row">
        <span>Pullback Distance:</span>
        <span class="diag-val" id="pullback-val">---</span>
      </div>
    </div>

    <div class="footer">Multi-Filter Trend & Pullback Engine</div>
  </div>

  <script>
    const APP_ID = '1089';
    const SYMBOL = 'R_75';
    const HISTORY_COUNT = 250; // Needs 250 ticks for clean 200 EMA trend detection

    let prices = [];
    let ws;
    let pingInterval;
    let watchDogTimeout;

    function connectWebSocket() {
      if (ws) ws.close();

      ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

      ws.onopen = () => {
        document.getElementById('live-dot').classList.remove('offline');

        // Request tick history
        ws.send(JSON.stringify({
          ticks_history: SYMBOL,
          count: HISTORY_COUNT,
          end: 'latest',
          style: 'ticks'
        }));

        // Subscribe to live tick stream
        ws.send(JSON.stringify({
          ticks: SYMBOL,
          subscribe: 1
        }));

        clearInterval(pingInterval);
        pingInterval = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ ping: 1 }));
          }
        }, 15000);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        resetWatchDog();

        if (data.msg_type === 'history') {
          prices = data.history.prices.map(p => Number(p));
          processSniperLogic();
        }

        if (data.msg_type === 'tick') {
          prices.push(Number(data.tick.quote));
          if (prices.length > HISTORY_COUNT) prices.shift();
          processSniperLogic();
        }
      };

      ws.onclose = () => {
        document.getElementById('live-dot').classList.add('offline');
        setTimeout(connectWebSocket, 2000);
      };

      ws.onerror = () => ws.close();
    }

    function resetWatchDog() {
      clearTimeout(watchDogTimeout);
      watchDogTimeout = setTimeout(() => connectWebSocket(), 5000);
    }

    function processSniperLogic() {
      if (prices.length < 200) return;

      const currentPrice = prices[prices.length - 1];
      document.getElementById('price-val').textContent = currentPrice.toFixed(4);

      // 1. Calculate Indicators
      const ema20 = calculateEMA(prices, 20);
      const ema50 = calculateEMA(prices, 50);
      const ema200 = calculateEMA(prices, 200);
      const rsi = calculateRSI(prices, 14);
      const atr = calculateATR(prices, 14);

      // 2. Macro Trend Filtering
      let macroTrend = 'RANGE';
      const macroEl = document.getElementById('macro-trend');

      if (ema50 > ema200 && currentPrice > ema200) {
        macroTrend = 'BULLISH';
        macroEl.textContent = 'BULLISH ▲';
        macroEl.className = 'diag-val trend-bull';
      } else if (ema50 < ema200 && currentPrice < ema200) {
        macroTrend = 'BEARISH';
        macroEl.textContent = 'BEARISH ▼';
        macroEl.className = 'diag-val trend-bear';
      } else {
        macroEl.textContent = 'SIDEWAYS ◄►';
        macroEl.className = 'diag-val trend-range';
      }

      document.getElementById('rsi-val').textContent = rsi.toFixed(1);

      // Distance from Fast EMA (measures pullback proximity)
      const pullbackDist = Math.abs(currentPrice - ema20);
      document.getElementById('pullback-val').textContent = pullbackDist.toFixed(2);

      // UI Elements
      const signalPanel = document.getElementById('signal-panel');
      const signalTag = document.getElementById('signal-tag');
      const signalDir = document.getElementById('signal-dir');
      const signalDesc = document.getElementById('signal-desc');

      const entryEl = document.getElementById('level-entry');
      const tpEl = document.getElementById('level-tp');
      const slEl = document.getElementById('level-sl');

      // 3. Sniper Entry Conditions
      // BULLISH SNIPER: Macro is Bullish AND price pulled back close to EMA20 AND RSI re-expanded from oversold (< 45)
      const isBuyPullback = currentPrice <= (ema20 + (atr * 0.3)) && currentPrice >= (ema50 - (atr * 0.5));
      const isBuySniper = macroTrend === 'BULLISH' && isBuyPullback && rsi >= 40 && rsi <= 58;

      // BEARISH SNIPER: Macro is Bearish AND price pulled back up to EMA20 AND RSI re-dropped from overbought (> 55)
      const isSellPullback = currentPrice >= (ema20 - (atr * 0.3)) && currentPrice <= (ema50 + (atr * 0.5));
      const isSellSniper = macroTrend === 'BEARISH' && isSellPullback && rsi <= 60 && rsi >= 42;

      if (isBuySniper) {
        signalPanel.className = 'signal-panel SNIPER_BUY';
        signalTag.textContent = '🎯 SNIPER BUY ENTRY';
        signalDir.textContent = 'BUY NOW';
        signalDesc.textContent = 'Trend pullback complete. Ideal risk/reward entry.';

        const slPrice = currentPrice - (atr * 1.2);
        const tpPrice = currentPrice + (atr * 2.4); // 1:2 Risk to Reward

        entryEl.textContent = currentPrice.toFixed(4);
        tpEl.textContent = tpPrice.toFixed(4);
        slEl.textContent = slPrice.toFixed(4);

      } else if (isSellSniper) {
        signalPanel.className = 'signal-panel SNIPER_SELL';
        signalTag.textContent = '🎯 SNIPER SELL ENTRY';
        signalDir.textContent = 'SELL NOW';
        signalDesc.textContent = 'Rally pullback complete. Ideal risk/reward entry.';

        const slPrice = currentPrice + (atr * 1.2);
        const tpPrice = currentPrice - (atr * 2.4); // 1:2 Risk to Reward

        entryEl.textContent = currentPrice.toFixed(4);
        tpEl.textContent = tpPrice.toFixed(4);
        slEl.textContent = slPrice.toFixed(4);

      } else {
        // NO TRADE / WAITING FOR SETUP
        signalPanel.className = 'signal-panel';
        signalTag.textContent = 'SCANNING MARKET';

        if (macroTrend === 'BULLISH') {
          signalDir.textContent = 'WAITING PULLBACK';
          signalDesc.textContent = 'Uptrend active. Waiting for price to drop to value area.';
        } else if (macroTrend === 'BEARISH') {
          signalDir.textContent = 'WAITING PULLBACK';
          signalDesc.textContent = 'Downtrend active. Waiting for price to bounce to value area.';
        } else {
          signalDir.textContent = 'NO TRADE (CHOP)';
          signalDesc.textContent = 'Market ranging. Avoiding bad entries.';
        }

        entryEl.textContent = '---';
        tpEl.textContent = '---';
        slEl.textContent = '---';
      }
    }

    // Exponential Moving Average (EMA)
    function calculateEMA(data, period) {
      const k = 2 / (period + 1);
      let ema = data.slice(0, period).reduce((a, b) => a + b, 0) / period;

      for (let i = period; i < data.length; i++) {
        ema = (data[i] * k) + (ema * (1 - k));
      }
      return ema;
    }

    // Relative Strength Index (RSI)
    function calculateRSI(data, period) {
      let gains = 0;
      let losses = 0;

      for (let i = data.length - period; i < data.length; i++) {
        const diff = data[i] - data[i - 1];
        if (diff >= 0) gains += diff;
        else losses += Math.abs(diff);
      }

      const avgGain = gains / period;
      const avgLoss = losses / period;

      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }

    // Average True Range (ATR)
    function calculateATR(data, period) {
      let ranges = [];
      for (let i = 1; i < data.length; i++) {
        ranges.push(Math.abs(data[i] - data[i - 1]));
      }
      const recent = ranges.slice(-period);
      return recent.reduce((a, b) => a + b, 0) / period;
    }

    // Launch Engine
    connectWebSocket();
  </script>
</body>
</html>
